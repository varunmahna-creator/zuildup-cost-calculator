steps:
  # Fetch secrets and write to a file in /workspace (shared across steps)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'fetch-secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_API_KEY --project=$PROJECT_ID > /workspace/_fb_api_key
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN --project=$PROJECT_ID > /workspace/_fb_auth_domain
        gcloud secrets versions access latest --secret=NEXT_PUBLIC_FIREBASE_APP_ID --project=$PROJECT_ID > /workspace/_fb_app_id

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        FB_API_KEY=$(cat /workspace/_fb_api_key)
        FB_AUTH_DOMAIN=$(cat /workspace/_fb_auth_domain)
        FB_APP_ID=$(cat /workspace/_fb_app_id)
        docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$${FB_API_KEY}" \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$${FB_AUTH_DOMAIN}" \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$PROJECT_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$${FB_APP_ID}" \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/zps/app:$COMMIT_SHA \
          -t asia-south1-docker.pkg.dev/$PROJECT_ID/zps/app:latest \
          .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'asia-south1-docker.pkg.dev/$PROJECT_ID/zps/app']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'zuildup-payment-schedule'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/zps/app:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=zuildup-payment-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,FIREBASE_PROJECT_ID=$PROJECT_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID=$PROJECT_ID,ALLOWED_DOMAIN=zuildup.com'
      - '--set-secrets=FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=4'
      - '--port=8080'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/zps/app'
